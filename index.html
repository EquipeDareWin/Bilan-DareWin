/* ══════════════════════════════════════
   MOTEUR DE CALCUL
══════════════════════════════════════ */
function compute(a){
  const q=n=>a[n-1]||0;
  const s=(...ns)=>ns.reduce((acc,n)=>acc+q(n),0);
  const r=(x,y)=>Array.from({length:y-x+1},(_,i)=>x+i);
  const exp=s(...r(1,15))/15*10;
  const inst=s(...r(16,26))/11*10;
  const val=s(...r(27,38))/12*10;
  const vroomScore=exp*inst*val;
  const vroomRatio=Math.round((vroomScore-1000)/(64000-1000)*100);
  const hygiene=exp, motivation=val;
  const exigence=s(16,17,18,19,20,27,28,29)/8*10;
  const autonomie=s(6,7,8,9,10,11,12,21,22,23,30,31,32,33)/14*10;
  const soutien=s(13,14,15,24,25,26,34,35,36,37,38)/11*10;
  const equite=s(20,27,28)/3*10;
  const equitePct=Math.round((equite-10)/30*100);
  const physio=s(1,27)/2*10;
  const securite=s(2,3,4,5,6,11,15,16,17,18,19,33)/12*10;
  const appartenance=s(7,13,14,24,25,26)/6*10;
  const estime=s(20,28,30,34,35,36,37,38)/8*10;
  const accomp=s(8,9,10,12,21,22,23,29,31,32)/10*10;
  return{exp,inst,val,vroomScore:Math.round(vroomScore),vroomRatio,hygiene,motivation,exigence,autonomie,soutien,equite,equitePct,physio,securite,appartenance,estime,accomp};
}

            scores.equitePct>=40&&scores.equitePct<66&&React.createElement("div",{style:{background:"#fefce8",border:"1.5px solid #ca8a04",borderRadius:10,padding:14,fontSize:13,color:"#92400e",marginTop:8}},"⚡ Votre sentiment d'équité est partiel — quelques ajustements pourraient faire une vraie différence.")
          ),

          paid&&tab==="avenir"&&React.createElement("div",{style:card()},
            React.createElement("h2",{style:{color:O,fontSize:18,fontWeight:800,margin:"0 0 6px"}},"🚀 Votre confiance en l'avenir professionnel"),
            React.createElement("p",{style:{color:"#666",fontSize:13,marginBottom:20}},"Vos besoins fondamentaux au travail, du plus concret au plus personnel."),
            ...[
              {label:"Confort et ressources de base",val:scores.physio,desc:"Rémunération, matériel, conditions"},
              {label:"Sécurité et stabilité",val:scores.securite,desc:"Emploi stable, clarté des règles"},
              {label:"Se sentir à sa place",val:scores.appartenance,desc:"Équipe, liens, collectif"},
              {label:"Être reconnu(e) et valorisé(e)",val:scores.estime,desc:"Reconnaissance, équité, fierté"},
              {label:"S'épanouir et progresser",val:scores.accomp,desc:"Autonomie, créativité, sens"},
            ].map(d=>{
              const p=pct(d.val),c=col(p);
              return React.createElement("div",{key:d.label,style:{marginBottom:16}},
                React.createElement("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:4}},
                  React.createElement("span",{style:{fontSize:13,fontWeight:600,color:D}},d.label),
                  React.createElement("span",{style:{fontSize:13,fontWeight:900,color:c}},fmt(d.val)+"/40")
                ),
                React.createElement("div",{style:{background:"#f0f0f0",borderRadius:99,height:9,overflow:"hidden"}},
                  React.createElement("div",{style:{width:p+"%",background:c,height:"100%",borderRadius:99}})
                ),
                React.createElement("div",{style:{fontSize:11,color:"#aaa",marginTop:3}},d.desc)
              );
            })
          ),

          // 📄 RAPPORT
          paid&&tab==="rapport"&&React.createElement("div",{style:card()},
            React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,flexWrap:"wrap",gap:10}},
              React.createElement("div",null,
                React.createElement("h2",{style:{color:O,fontSize:18,fontWeight:800,margin:"0 0 4px"}},"📄 Votre rapport personnalisé"),
                React.createElement("p",{style:{color:"#888",fontSize:13,margin:0}},ctx.poste+" · "+ctx.secteur+" · "+ctx.anciennete)
              ),
              !reportLoading&&report&&React.createElement("button",{onClick:handlePrint,className:"no-print",style:{...btn("#6b7280"),fontSize:13,padding:"9px 18px"}},"🖨️ Télécharger PDF")
            ),
            reportLoading?React.createElement("div",{style:{textAlign:"center",padding:"48px 20px"}},
              React.createElement("div",{style:{fontSize:40,marginBottom:14}},"✍️"),
              React.createElement("p",{style:{color:O,fontWeight:700,fontSize:16,margin:"0 0 8px"}},"Rédaction de votre rapport…"),
              React.createElement("p",{style:{color:"#888",fontSize:14}},"Personnalisation pour "+ctx.poste+" · "+ctx.secteur),
              React.createElement("p",{style:{color:"#bbb",fontSize:12,marginTop:8}},"Environ 30 à 60 secondes")
            ):React.createElement("div",{className:"rapport-wrap"},
              React.createElement("style",null,`
                .rapport-content h1{font-size:20pt;color:#F98200;border-bottom:2px solid #F98200;padding-bottom:6px;margin-top:32px;margin-bottom:12px;font-weight:800;text-align:left}
                .rapport-content h2{font-size:14pt;color:#009245;margin-top:22px;margin-bottom:8px;font-weight:700;text-align:left}
                .rapport-content h3{font-size:12pt;color:#333;margin-top:16px;margin-bottom:6px;font-weight:700}
                .rapport-content p{font-size:11pt;color:#000;text-align:justify;line-height:1.65;margin-bottom:10px}
                .rapport-content ul{font-size:11pt;color:#000;line-height:1.65;padding-left:22px;margin-bottom:12px}
                .rapport-content li{margin-bottom:6px}
                .rapport-content strong{font-weight:bold}
                .rapport-content em{font-style:italic;color:#444}
                .rapport-content hr{border:none;border-top:1px solid #e5e7eb;margin:24px 0}
                .rapport-content blockquote{border-left:3px solid #F98200;padding:8px 16px;margin:12px 0;color:#555;font-style:italic}
              `),
              React.createElement("div",{className:"rapport-content",dangerouslySetInnerHTML:{__html:report}})
            )
          )
        ),

        // CTA PAIEMENT BAS DE PAGE (si non payé)
        !paid&&React.createElement("div",{className:"no-print",style:{...card({background:"linear-gradient(135deg,#fff8f0,white)",border:"2px solid "+O}),textAlign:"center",marginTop:16,padding:32}},
          React.createElement("h3",{style:{color:O,fontSize:18,fontWeight:800,margin:"0 0 8px"}},"🎯 Votre rapport complet vous attend"),
          React.createElement("p",{style:{color:"#555",fontSize:14,marginBottom:16,maxWidth:400,margin:"0 auto 16px"}},"~4 000 mots · 5 dimensions · Préconisations personnalisées · PDF téléchargeable"),
          React.createElement("button",{onClick:handlePay,style:{...btn(O),fontSize:17,padding:"15px 36px",borderRadius:12,boxShadow:"0 4px 20px "+O+"40"}},
            "Débloquer mon rapport — "+CFG.prix+"€"
          ),
          React.createElement("p",{style:{color:"#aaa",fontSize:12,marginTop:10}},"Paiement sécurisé · CB · Apple Pay · Google Pay · Stripe")
        )
      )
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
